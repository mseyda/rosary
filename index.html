<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tespih Koleksiyonu — Seyda</title>
  <meta name="description" content="Seyda'nın özel tespih koleksiyonu">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────── -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div>
          <div class="brand-label">seyda.me / rosary</div>
          <h1 class="brand-title">Tespih Koleksiyonu</h1>
        </div>
        <div class="header-right">
          <div class="header-stats" id="header-stats"></div>
          <div class="admin-controls">
            <span class="admin-badge" id="admin-badge">Admin</span>
            <button class="lock-btn" id="lock-btn" title="Admin Girişi">🔒</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────── -->
  <main>
    <div class="container">

      <!-- Controls -->
      <div class="controls-bar">
        <div class="search-wrap">
          <input type="search" id="search-input" placeholder="Usta, hammadde veya renk ara…" autocomplete="off">
        </div>
        <div class="filters">
          <select id="filter-material"></select>
          <select id="filter-color"></select>
          <select id="filter-maker"></select>
          <select id="sort-by">
            <option value="date-desc">Yeniden Eskiye</option>
            <option value="date-asc">Eskiden Yeniye</option>
            <option value="value-desc">Değer ↓</option>
            <option value="value-asc">Değer ↑</option>
            <option value="weight-desc">Ağırlık ↓</option>
            <option value="weight-asc">Ağırlık ↑</option>
          </select>
        </div>
      </div>

      <!-- Collection Label + Add button -->
      <div class="section-label">
        <span id="collection-count"></span>
        <button class="btn-add-rosary" id="btn-add-rosary" style="display:none">+ Yeni Tespih</button>
      </div>

      <!-- Collection Grid -->
      <div class="rosary-grid" id="rosary-grid"></div>

      <!-- Archive Section -->
      <div class="archive-section">
        <div class="archive-toggle" id="archive-toggle">
          <h2 class="archive-title">Arşiv</h2>
          <span class="archive-desc">Hediye edilen tespihler</span>
          <span class="archive-chevron">▼</span>
        </div>
        <div class="archive-cards" id="archive-cards" style="display:none"></div>
      </div>

    </div>
  </main>

  <!-- ── Collection Detail Modal ───────────────────── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="rosary-modal">
      <button class="modal-close" id="modal-close" aria-label="Kapat">✕</button>
      <div class="modal-color-bar" id="modal-color-bar"></div>
      <div class="modal-body">

        <!-- Left: Gallery -->
        <div class="modal-image-section">
          <div id="gallery-main">
            <img id="gallery-img" src="" alt="" style="display:none">
            <video id="gallery-video" controls playsinline style="display:none"></video>
            <div id="gallery-placeholder" style="display:flex">
              <span class="icon">📿</span>
              <span class="lbl">Görsel eklenmemiş</span>
            </div>
          </div>
          <div id="gallery-thumbs"></div>
          <div id="gallery-actions">
            <button id="gallery-upload-btn" style="display:none">Yükle</button>
          </div>
          <input type="file" id="image-input" accept="image/*" multiple hidden>
          <input type="file" id="video-input" accept="video/*" hidden>
        </div>

        <!-- Right: Details -->
        <div class="modal-details-section">
          <div id="modal-header"></div>
          <table class="details-table" id="details-table"></table>
          <button class="modal-delete-btn" id="modal-delete-btn" style="display:none">🗑 Tespih Sil</button>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Auth Modal ─────────────────────────────────── -->
  <div class="modal-overlay" id="auth-modal-overlay">
    <div class="modal auth-modal">
      <button class="modal-close" id="auth-close-btn" aria-label="Kapat">✕</button>

      <div class="auth-modal-body">
        <div class="auth-icon">🔐</div>
        <h2 class="auth-title" id="auth-modal-title">Admin Girişi</h2>
        <p class="auth-hint" id="auth-modal-hint"></p>

        <div class="auth-field">
          <input type="password" id="auth-password" placeholder="Şifre" autocomplete="current-password">
          <button class="toggle-pw" type="button" title="Şifreyi göster">👁</button>
        </div>
        <p class="auth-error" id="auth-error"></p>

        <button class="auth-submit-btn" id="auth-submit-btn">Giriş Yap</button>

      </div>
    </div>
  </div>

  <!-- ── Add Rosary Modal ───────────────────────────── -->
  <div class="modal-overlay" id="add-rosary-overlay">
    <div class="modal add-rosary-modal">
      <button class="modal-close" id="add-rosary-close" aria-label="Kapat">✕</button>
      <div class="add-rosary-body">
        <h2 class="add-rosary-title">Yeni Tespih Ekle</h2>
        <form id="add-rosary-form" autocomplete="off">
          <div class="form-row">
            <div class="form-field form-field-grow">
              <label>Usta / Atölye *</label>
              <input type="text" id="f-maker" placeholder="Usta adı" required>
            </div>
            <div class="form-field">
              <label>Tür</label>
              <select id="f-ua"><option value="U">Usta</option><option value="A">Atölye</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field form-field-grow">
              <label>Hammadde *</label>
              <input type="text" id="f-material" placeholder="ör. Kehribar" required>
            </div>
            <div class="form-field">
              <label>Renk</label>
              <input type="text" id="f-color" placeholder="ör. Damla">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field form-field-grow">
              <label>Şekil *</label>
              <input type="text" id="f-shape" placeholder="ör. Yuvarlak" required>
            </div>
            <div class="form-field">
              <label>Tane Sayısı *</label>
              <input type="number" id="f-count" placeholder="99" min="1" required>
            </div>
            <div class="form-field">
              <label>Tür</label>
              <select id="f-style"><option value="D">Düz</option><option value="S">Süslü</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>En (mm)</label>
              <input type="number" id="f-width" placeholder="12" step="0.1">
            </div>
            <div class="form-field">
              <label>Boy (mm)</label>
              <input type="number" id="f-length" placeholder="15" step="0.1">
            </div>
            <div class="form-field">
              <label>Ağırlık (g)</label>
              <input type="number" id="f-weight" placeholder="45" step="0.1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>Değer (₺)</label>
              <input type="number" id="f-valueTRY" placeholder="0" min="0">
            </div>
            <div class="form-field">
              <label>Değer (€)</label>
              <input type="number" id="f-valueEUR" placeholder="0" min="0" step="0.01">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field form-field-grow">
              <label>Satıcı</label>
              <input type="text" id="f-seller" placeholder="ör. Kapalıçarşı">
            </div>
            <div class="form-field">
              <label>Tarih</label>
              <input type="date" id="f-date">
            </div>
          </div>
          <p class="add-rosary-error" id="add-rosary-error"></p>
          <button type="submit" class="add-rosary-submit" id="add-rosary-submit">Ekle</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer class="site-footer">
    seyda.me &nbsp;·&nbsp; Tespih Koleksiyonu
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
